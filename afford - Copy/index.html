<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Professional, premium-designed inventory management dashboard for Dell products. Real-time stock check, instant addition, and tracking." />
  <title>Dell Inventory Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-container">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="m8 12 4 4 4-8"/>
        </svg>
        <h1 class="brand-title">
          <span class="brand-mark">DELL</span>
          <span class="brand-sub">Inventory System</span>
        </h1>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
        <span class="theme-text">Light Mode</span>
      </button>
    </div>
  </header>

  <main class="container">
    <div class="dashboard-grid">
      <!-- Left Column: Operations -->
      <div class="dashboard-sidebar">
        <!-- Add Product Section -->
        <section class="card animate-fade-in">
          <div class="card-header">
            <svg class="section-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <h2>Add Product</h2>
          </div>
          <form id="add-form" class="row">
            <div class="input-group">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="9" y1="9" x2="15" y2="9"/>
                <line x1="9" y1="13" x2="15" y2="13"/>
                <line x1="9" y1="17" x2="13" y2="17"/>
              </svg>
              <input
                type="text"
                id="product-name-input"
                placeholder="Enter Dell product (e.g. XPS 13)"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">
              <span>Add Product</span>
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5v14"/>
              </svg>
            </button>
          </form>
          <p id="add-message" class="message"></p>
        </section>

        <!-- Check Availability Section -->
        <section class="card animate-fade-in delay-1">
          <div class="card-header">
            <svg class="section-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
            <h2>Check Availability</h2>
          </div>
          <form id="check-form" class="row">
            <div class="input-group">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
              </svg>
              <input
                type="text"
                id="check-name-input"
                placeholder="Enter product to check"
                required
              />
            </div>
            <button type="submit" class="btn btn-secondary">
              <span>Check Stock</span>
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 11 12 14 22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
            </button>
          </form>
          <p id="check-message" class="message"></p>
        </section>
      </div>

      <!-- Right Column: Inventory View -->
      <div class="dashboard-content">
        <section class="card card-large animate-fade-in delay-2">
          <div class="inventory-header">
            <div class="card-header">
              <svg class="section-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
              </svg>
              <h2>Current Inventory</h2>
            </div>
            <span id="item-count" class="badge">0 items</span>
          </div>
          <ul id="inventory-list" class="inventory-list"></ul>
          <div id="empty-message" class="empty-message-container">
            <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
              <path d="M3.3 7 12 12l8.7-5"/>
              <path d="M12 22V12"/>
            </svg>
            <p class="empty-message">No products in inventory.</p>
          </div>
        </section>
      </div>
    </div>
  </main>


  <script src="script.js"></script>
  <script>
    // Theme Switcher Logic
    const themeToggleBtn = document.getElementById("theme-toggle");
    const themeText = themeToggleBtn.querySelector(".theme-text");
    const sunIcon = themeToggleBtn.querySelector(".sun-icon");
    const moonIcon = themeToggleBtn.querySelector(".moon-icon");

    // Check saved theme or default to dark
    const savedTheme = localStorage.getItem("theme") || "dark";
    if (savedTheme === "light") {
      document.body.classList.add("light-mode");
      themeText.textContent = "Dark Mode";
      sunIcon.style.display = "none";
      moonIcon.style.display = "inline-block";
    } else {
      document.body.classList.remove("light-mode");
      themeText.textContent = "Light Mode";
      sunIcon.style.display = "inline-block";
      moonIcon.style.display = "none";
    }

    themeToggleBtn.addEventListener("click", () => {
      const isLight = document.body.classList.toggle("light-mode");
      if (isLight) {
        localStorage.setItem("theme", "light");
        themeText.textContent = "Dark Mode";
        sunIcon.style.display = "none";
        moonIcon.style.display = "inline-block";
      } else {
        localStorage.setItem("theme", "dark");
        themeText.textContent = "Light Mode";
        sunIcon.style.display = "inline-block";
        moonIcon.style.display = "none";
      }
    });
  </script>
</body>
</html>
